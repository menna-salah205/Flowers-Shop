<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart – Flowers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inria+Serif:ital,wght@0,300;0,400;0,700;1,400&family=Island+Moments&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="nav-placeholder"></div>

<!-- PAGE HERO -->
<section class="page-hero">
  <h1>My Cart</h1>
  <p>Review your items and proceed to checkout</p>
  <div class="breadcrumb-custom">
    <a href="index.html">Home</a>
    <i class="fa-solid fa-chevron-right" style="font-size:0.7rem"></i>
    <span>Cart</span>
  </div>
</section>

<!-- CART SECTION -->
<section class="cart-section">
  <div class="container">

    <!-- EMPTY CART -->
    <div id="cart-empty" class="empty-state" style="display:none">
      <div class="empty-icon-wrap">
        <i class="fa-solid fa-cart-shopping"></i>
      </div>
      <h4>Your Cart is Empty</h4>
      <p>Looks like you haven't added any bouquets yet. Browse our collection to find the perfect one.</p>
      <a href="products.html" class="btn-primary-custom">
        Shop Now
      </a>
    </div>

    <!-- CART CONTENT -->
    <div id="cart-summary-area" style="display:none">
      <div class="row g-5">

        <!-- CART ITEMS -->
        <div class="col-lg-7">
          <div class="cart-header mb-3 d-flex align-itens-center justify-content-between">
            <h5>Items in Your Cart</h5>
            <button class="clear-cart-btn" onclick="clearCart()">
              <i class="fa-solid fa-trash-can"></i> Clear All
            </button>
          </div>
          <div id="cart-list"></div>
        </div>

        <!-- ORDER SUMMARY -->
        <div class="col-lg-5">
          <div class="cart-summary">
            <h5>Order Summary</h5>

            <div class="summary-row">
              <span>Subtotal</span>
              <span id="subtotal-val">$0.00</span>
            </div>
            <div class="summary-row">
              <span>Shipping</span>
              <span id="shipping-val">$8.00</span>
            </div>
            <div class="summary-row free-shipping-note">
              <span>Free shipping on orders over $60</span>
            </div>

            <!-- PROMO CODE -->
            <div class="promo-section">
              <label>Promo Code</label>
              <div class="promo-input-wrap">
                <input type="text" placeholder="Enter code" id="promo-input">
                <button onclick="applyPromo()">Apply</button>
              </div>
              <div id="promo-msg" class="promo-msg"></div>
            </div>

            <div class="summary-divider"></div>
            <div class="summary-row summary-total">
              <span>Total</span>
              <span id="total-val">$0.00</span>
            </div>

            <button class="checkout-btn" onclick="handleCheckout()">
              Secure Checkout
            </button>

            <div class="payment-icons d-flex align-itens-center justify-content-start gap-3 my-3">
              <i class="fa-brands fa-cc-visa"></i>
              <i class="fa-brands fa-cc-mastercard"></i>
              <i class="fa-brands fa-cc-paypal"></i>
              <i class="fa-brands fa-cc-apple-pay"></i>
            </div>

            <button class="continue-shopping">
              <a href="products.html">
                <i class="fa-solid fa-arrow-left"></i> Continue Shopping
              </a>
            </button>
          </div>
        </div>

      </div>
    </div>

  </div>
</section>



<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="components.js"></script>
<script src="main.js"></script>
<script>

  function clearCart() {
    cart.length = 0;
    saveCart();
    renderCartPage();
    showToast('Cart cleared!');
  }

  const PROMOS = { 'BLOOM10': 10, 'FLOWERS20': 20 };
  // appliedDiscount is already declared in main.js — do not re-declare here

  function applyPromo() {
    const code = document.getElementById('promo-input').value.trim().toUpperCase();
    const msg = document.getElementById('promo-msg');
    if (PROMOS[code]) {
      appliedDiscount = PROMOS[code];
      msg.textContent = `Promo applied: ${appliedDiscount}% off!`;
      msg.style.color = 'var(--green)';
      showToast(`Promo code ${code} applied!`);
      renderCartPage();
    } else {
      msg.textContent = 'Invalid promo code.';
      msg.style.color = 'var(--pink)';
    }
  }

  function handleCheckout() {
    if (!user) {
      openAuthModal();
      showToast('Please sign in to checkout', 'pink');
    } else {
      showToast('Redirecting to checkout...');
    }
  }

  // Render recommendations (products not in cart)
  document.addEventListener('DOMContentLoaded', () => {
    const recGrid = document.getElementById('cart-recommendations');
    if (recGrid) {
      const cartIds = cart.map(i => i.id);
      const recs = PRODUCTS.filter(p => !cartIds.includes(p.id)).slice(0, 4);
      recGrid.innerHTML = recs.map(p => `<div class="col-sm-6 col-lg-3">${productCardHTML(p)}</div>`).join('');
    }
  });
</script>
</body>
</html>
