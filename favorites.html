<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favorites – Flowers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inria+Serif:ital,wght@0,300;0,400;0,700;1,400&family=Island+Moments&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="nav-placeholder"></div>

<!-- PAGE HERO -->
<section class="page-hero">
  <h1>My Favorites</h1>
  <p>Your saved bouquets, all in one place</p>
  <div class="breadcrumb-custom">
    <a href="index.html">Home</a>
    <i class="fa-solid fa-chevron-right" style="font-size:0.7rem"></i>
    <span>Favorites</span>
  </div>
</section>

<!-- FAVORITES SECTION -->
<section class="favorites-section">
  <div class="container">

    <!-- EMPTY STATE -->
    <div id="favs-empty" class="empty-state" style="display:none">
      <div class="empty-icon-wrap">
        <i class="fa-regular fa-heart"></i>
      </div>
      <h4>No Favorites Yet</h4>
      <p>Browse our collection and save the bouquets you love by clicking the heart icon.</p>
      <a href="products.html" class="btn-primary-custom">
        <i class="fa-solid fa-bag-shopping"></i> Browse Collection
      </a>
    </div>

    <!-- FAVORITES GRID -->
    <div class="row g-4" id="favorites-grid"></div>

    <!-- CLEAR ALL -->
    <div id="favs-actions" class="favs-actions" style="display:none">
      <button class="btn-outline-custom" onclick="clearAllFavs()">
        <i class="fa-solid fa-trash"></i> Clear All Favorites
      </button>
      <a href="products.html" class="btn-primary-custom">
        <i class="fa-solid fa-plus"></i> Add More
      </a>
    </div>

  </div>
</section>

<!-- SUBSCRIBE -->
<section class="subscribe-section">
  <div class="subscribe-content">
    <h2>Stay in Bloom</h2>
    <p>Get notified when your favorite bouquets go on sale.</p>
    <form class="subscribe-form" onsubmit="handleSubscribeForm(event)">
      <input type="email" placeholder="Your email address" required>
      <button type="submit">Subscribe</button>
    </form>
  </div>
</section>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="components.js"></script>
<script src="main.js"></script>
<script>
  function clearAllFavs() {
    favorites = [];
    saveFavs();
    renderFavoritesPage();
    showToast('All favorites cleared!', 'pink');
  }

  // Show/hide actions bar based on favorites
  document.addEventListener('DOMContentLoaded', () => {
    function checkFavsActions() {
      const actions = document.getElementById('favs-actions');
      if (actions) actions.style.display = favorites.length > 0 ? 'flex' : 'none';
    }
    checkFavsActions();
    // Patch saveFavs to also update the actions bar
    const _origSaveFavs = saveFavs;
    window.saveFavs = function() {
      _origSaveFavs();
      checkFavsActions();
    };
  });
</script>
</body>
</html>
