<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop – Flowers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inria+Serif:ital,wght@0,300;0,400;0,700;1,400&family=Island+Moments&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="nav-placeholder"></div>

<!-- PAGE HERO -->
<section class="page-hero">
  <h1>Our Collection</h1>
  <p>Hand-crafted bouquets made fresh daily by our expert florists</p>
  <div class="breadcrumb-custom">
    <a href="index.html">Home</a>
    <i class="fa-solid fa-chevron-right" style="font-size:0.7rem"></i>
    <span>Products</span>
  </div>
</section>

<!-- PRODUCTS SECTION -->
<section class="products-section">
  <div class="container-fluid px-0">
    <div class="row g-3">

      <!-- SIDEBAR -->
      <div class="col-lg-3">
        <div class="products-sidebar">

          <div class="sidebar-block reveal">
            <h6 class="sidebar-title">
              Filter by Category
            </h6>
            <div class="sidebar-cats">
              <button class="sidebar-cat-btn active" onclick="filterByCategory('all'); setSidebarCat(this)">
                All Flowers
                <span class="cat-count">8</span>
              </button>
              <button class="sidebar-cat-btn" onclick="filterByCategory('roses'); setSidebarCat(this)">
                Roses
                <span class="cat-count">2</span>
              </button>
              <button class="sidebar-cat-btn" onclick="filterByCategory('orchids'); setSidebarCat(this)">
                Orchids
                <span class="cat-count">2</span>
              </button>
              <button class="sidebar-cat-btn" onclick="filterByCategory('tulips'); setSidebarCat(this)">
                Tulips
                <span class="cat-count">1</span>
              </button>
              <button class="sidebar-cat-btn" onclick="filterByCategory('seasonal'); setSidebarCat(this)">
                Seasonal
                <span class="cat-count">3</span>
              </button>
            </div>
          </div>

          <div class="sidebar-block reveal reveal-delay-1">
            <h6 class="sidebar-title">
              Price Range
            </h6>
            <div class="price-range-wrapper">
              <div class="price-labels">
                <span>$0</span>
                <span id="price-max-display">$100</span>
              </div>
              <input type="range" id="price-slider" min="20" max="100" value="100" class="price-slider-input">
            </div>
          </div>

          <div class="sidebar-block reveal reveal-delay-2">
            <h6 class="sidebar-title">
              Sort By
            </h6>
            <select class="sidebar-select w-100" onchange="sortProducts(this.value)">
              <option value="default">Default</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="rating">Top Rated</option>
            </select>
          </div>

          <div class="sidebar-block border-0 reveal reveal-delay-3">
            <h6 class="sidebar-title">
              Special Offers
            </h6>
            <label class="sidebar-check">
              <input type="checkbox" onchange="filterSale(this.checked)">
              <span>On Sale Only</span>
            </label>
          </div>

        </div>
      </div>

      <!-- PRODUCTS GRID -->
      <div class="col-lg-9">
        <div class="products-main">
          <div class="products-top-bar mb-3 reveal">
            <span id="products-count" class="products-count">Showing 8 of 8 products</span>
          </div>
          <div class="row g-4" id="products-grid"></div>
          <div class="pagination-wrapper d-flex justify-content-center gap-2 mt-4" id="pagination"></div>
        </div>
      </div>

    </div>
  </div>
</section>

<!-- SUBSCRIBE -->
<section class="subscribe-section">
  <div class="subscribe-content">
    <h2>Stay in Bloom</h2>
    <p>Subscribe for seasonal collections, flower care tips, and exclusive offers.</p>
    <form class="subscribe-form" onsubmit="handleSubscribeForm(event)">
      <input type="email" placeholder="Your email address" required>
      <button type="submit">Subscribe</button>
    </form>
  </div>
</section>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="components.js"></script>
<script src="main.js"></script>
<script>

</script>
</body>
</html>
